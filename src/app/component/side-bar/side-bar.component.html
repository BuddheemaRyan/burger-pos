<div
  class="h-screen w-60 bg-zinc-900 text-zinc-100 flex flex-col border-r border-zinc-800 shadow-2xl"
>
  <!-- Logo -->
  <div class="p-6 border-b border-zinc-800">
    <div class="flex items-center gap-3">
      <div
        class="w-12 h-12 bg-gradient-to-br from-amber-500 to-orange-600 rounded-2xl flex items-center justify-center text-4xl shadow-inner"
      >
        🍔
      </div>
      <div>
        <h1 class="text-3xl font-bold tracking-tighter text-white">
          BurgerPOS
        </h1>
        <p
          class="text-[10px] uppercase tracking-[2px] text-amber-400 font-medium"
        >
          Point of Sale
        </p>
      </div>
    </div>
  </div>

  <!-- Navigation -->
  <nav class="flex-1 px-4 py-6 overflow-y-auto">
    <ul class="space-y-1">
      <!-- Dashboard -->
      <li>
        <a
          routerLink="/"
          routerLinkActive="bg-amber-600 text-white"
          class="flex items-center gap-3 px-5 py-4 rounded-2xl hover:bg-zinc-800 transition-all group"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="w-5 h-5 text-zinc-400 group-hover:text-amber-400 transition-colors"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
            stroke-width="2"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1v-5m10-10l2 2m-2-2v10a1 1 0 01-1 1v-5m-6 0a1 1 0 001-1v5"
            />
          </svg>
          <span class="font-medium">Dashboard</span>
        </a>
      </li>

      <!-- Take Order -->
      <li>
        <a
          routerLink="/order"
          routerLinkActive="bg-amber-600 text-white"
          class="flex items-center gap-3 px-5 py-4 rounded-2xl hover:bg-zinc-800 transition-all group"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="w-5 h-5 text-zinc-400 group-hover:text-amber-400 transition-colors"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
            stroke-width="2"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M16 11V7a4 4 0 00-8 0 4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"
            />
          </svg>
          <span class="font-medium"> Order</span>
        </a>
      </li>

      <!-- Orders -->
      <li>
        <a
          routerLink="/orders"
          routerLinkActive="bg-amber-600 text-white"
          class="flex items-center gap-3 px-5 py-4 rounded-2xl hover:bg-zinc-800 transition-all group"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="w-5 h-5 text-zinc-400 group-hover:text-amber-400 transition-colors"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
            stroke-width="2"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2 2 2 0 01-2 2v-2a2 2 0 012-2 2 2 0 01-2-2V7a2 2 0 012-2 2 2 0 01-2-2v2a2 2 0 01-2 2"
            />
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M15 9h-3M15 15h-3"
            />
          </svg>
          <span class="font-medium">Take Order</span>
        </a>
      </li>
    </ul>
  </nav>

  <!-- Footer / Logout -->
  <div class="p-4 border-t border-zinc-800">
    <button
      (click)="logout()"
      class="w-full flex items-center gap-3 px-5 py-4 rounded-2xl hover:bg-red-950 hover:text-red-400 text-zinc-400 transition-all group"
    >
      <svg
        xmlns="http://www.w3.org/2000/svg"
        class="w-5 h-5 group-hover:text-red-400 transition-colors"
        fill="none"
        viewBox="0 0 24 24"
        stroke="currentColor"
        stroke-width="2"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          d="M17 16l4-4m0 0l-4-4m4 4V7m-4 4V7"
        />
      </svg>
      <span class="font-medium">Logout</span>
    </button>
  </div>
</div>
